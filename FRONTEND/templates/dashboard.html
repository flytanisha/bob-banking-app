{% extends "base.html" %}

{% block content %}

<div class="row mb-4">
  <div class="col">
    <h2 class="mb-3">Welcome back, {{ customer_name }}!</h2>
    <div class="card sb-balance-card">
      <div class="card-body text-center py-4">
        <p class="text-muted mb-1 text-uppercase fw-semibold" style="font-size: 0.8rem; letter-spacing: 0.1em;">Current Balance</p>
        <p class="balance-amount mb-0">${{ "%.2f"|format(balance) }}</p>
      </div>
    </div>
  </div>
</div>

<div class="row g-4">

  <div class="col-md-6">
    <div class="card h-100">
      <div class="card-header fw-semibold">Deposit Funds</div>
      <div class="card-body">
        <p class="text-muted small mb-3">Enter the amount you wish to deposit into your account.</p>
        <form method="POST" action="{{ url_for('deposit') }}" novalidate>
          <div class="mb-3">
            <label for="deposit-amount" class="form-label">Amount ($)</label>
            <input type="number" id="deposit-amount" name="amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success">Deposit</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card h-100">
      <div class="card-header fw-semibold">Withdraw Funds</div>
      <div class="card-body">
        <p class="text-muted small mb-3">Enter the amount you wish to withdraw from your account.</p>
        <form method="POST" action="{{ url_for('withdraw') }}" novalidate>
          <div class="mb-3">
            <label for="withdraw-amount" class="form-label">Amount ($)</label>
            <input type="number" id="withdraw-amount" name="amount" class="form-control" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-danger">Withdraw</button>
          </div>
        </form>
      </div>
    </div>
  </div>

</div>
{% endblock %}
